<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SenioCare AI Agent - API Documentation</title>
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5/swagger-ui.css">
    <style>
        body { margin: 0; background: #fafafa; }
        .swagger-ui .topbar { display: none; }
        .swagger-ui .info { margin-top: 20px; }
    </style>
</head>
<body>
    <div id="swagger-ui"></div>
    <script src="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
    <script>
    /*
     * SenioCare AI Agent - Static Swagger UI
     *
     * HOW TO USE:
     * 1. Run the server locally: python main.py
     * 2. Visit http://localhost:8080/export-openapi and save response as openapi.json
     * 3. Place openapi.json in the same directory as this HTML file
     * 4. Deploy both files to GitHub Pages, Netlify, or any static host
     *
     * OR: Update the "url" below to point to your hosted openapi.json URL
     */
    const ui = SwaggerUIBundle({
        url: "./openapi.json",    // Update this if hosted elsewhere
        dom_id: "#swagger-ui",
        layout: "BaseLayout",
        deepLinking: true,
        showExtensions: true,
        showCommonExtensions: true,
        presets: [
            SwaggerUIBundle.presets.apis,
            SwaggerUIBundle.SwaggerUIStandalonePreset
        ],
    });
    </script>
</body>
</html>
